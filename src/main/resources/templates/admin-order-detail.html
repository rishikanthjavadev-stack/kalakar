<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <title>Order Detail | KALAKAR Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;700&family=Bebas+Neue&family=Karla:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --saffron: #E8621A; --night: #0F0C09; --bone: #F2EDE4; --cream: #EDE7D9; --warm-grey: #9C9080; --border: rgba(15,12,9,0.1); }
    body { font-family: 'Karla', sans-serif; background: var(--cream); display: flex; min-height: 100vh; }
    .sidebar { width: 240px; background: var(--night); color: var(--bone); padding: 2rem 1.5rem; display: flex; flex-direction: column; gap: 0.5rem; position: fixed; height: 100vh; }
    .sidebar-logo { font-family: 'Bebas Neue', sans-serif; font-size: 1.8rem; letter-spacing: 0.15em; margin-bottom: 2rem; }
    .sidebar-logo span { color: var(--saffron); }
    .sidebar-label { font-size: 0.62rem; letter-spacing: 0.2em; text-transform: uppercase; color: rgba(242,237,228,0.3); margin: 1rem 0 0.5rem; }
    .sidebar-link { display: flex; align-items: center; gap: 0.8rem; padding: 0.7rem 1rem; color: rgba(242,237,228,0.6); text-decoration: none; font-size: 0.88rem; transition: all 0.2s; }
    .sidebar-link:hover, .sidebar-link.active { background: rgba(255,255,255,0.06); color: var(--bone); }
    .sidebar-link.active { border-left: 2px solid var(--saffron); }
    .main { margin-left: 240px; flex: 1; padding: 2.5rem; }
    .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
    .page-title { font-family: 'Cormorant Garamond', serif; font-size: 2rem; font-weight: 700; }
    .back-link { color: var(--warm-grey); text-decoration: none; font-size: 0.82rem; }
    .detail-grid { display: grid; grid-template-columns: 1.5fr 1fr; gap: 2rem; }
    .card { background: white; padding: 1.8rem; box-shadow: 0 2px 12px rgba(15,12,9,0.06); }
    .card-title { font-size: 0.7rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--saffron); margin-bottom: 1.2rem; padding-bottom: 0.5rem; border-bottom: 1px solid var(--border); }
    .info-row { display: flex; justify-content: space-between; font-size: 0.88rem; margin-bottom: 0.8rem; }
    .info-label { color: var(--warm-grey); }
    .order-item { display: flex; gap: 1rem; padding: 1rem 0; border-bottom: 1px solid var(--border); align-items: center; }
    .order-item:last-child { border-bottom: none; }
    .item-img { width: 60px; height: 60px; object-fit: cover; background: var(--cream); border: 1px solid var(--border); flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 1.4rem; }
    .item-img img { width: 100%; height: 100%; object-fit: cover; }
    .item-name { font-family: 'Cormorant Garamond', serif; font-size: 1rem; font-weight: 600; }
    .item-sub { font-size: 0.78rem; color: var(--warm-grey); margin-top: 0.2rem; }
    .item-price { margin-left: auto; font-weight: 600; }
    .total-row { display: flex; justify-content: space-between; font-family: 'Cormorant Garamond', serif; font-size: 1.2rem; font-weight: 700; padding-top: 1rem; border-top: 1px solid var(--border); margin-top: 0.5rem; }
    .status-form { display: flex; gap: 0.8rem; align-items: center; margin-top: 1rem; }
    .status-select { flex: 1; padding: 0.7rem; border: 1.5px solid var(--border); background: white; font-family: 'Karla', sans-serif; font-size: 0.88rem; }
    .btn-update { padding: 0.7rem 1.5rem; background: var(--saffron); color: white; border: none; font-family: 'Karla', sans-serif; font-size: 0.8rem; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; transition: background 0.2s; }
    .btn-update:hover { background: var(--night); }
    .status-badge { display: inline-block; padding: 0.3rem 0.8rem; font-size: 0.72rem; letter-spacing: 0.1em; text-transform: uppercase; }
    .status-PENDING   { background: #fff3e0; color: #e65100; }
    .status-CONFIRMED { background: #e3f2fd; color: #1565c0; }
    .status-SHIPPED   { background: #f3e5f5; color: #6a1b9a; }
    .status-DELIVERED { background: #e8f5e9; color: #2e7d32; }
    .status-CANCELLED { background: #ffebee; color: #c62828; }
  </style>
</head>
<body>
  <aside class="sidebar">
    <div class="sidebar-logo">KAL<span>A</span>KAR</div>
    <span class="sidebar-label">Store</span>
    <a href="/" class="sidebar-link">🏠 View Store</a>
    <span class="sidebar-label">Products</span>
    <a href="/admin/products" class="sidebar-link">👗 All Products</a>
    <span class="sidebar-label">Orders</span>
    <a href="/admin/orders" class="sidebar-link active">📦 All Orders</a>
    <span class="sidebar-label">Account</span>
    <a href="/logout" class="sidebar-link">🚪 Logout</a>
  </aside>

  <main class="main">
    <div class="page-header">
      <h1 class="page-title" th:text="'Order #KAL-' + ${order.id}">Order Detail</h1>
      <a href="/admin/orders" class="back-link">← Back to Orders</a>
    </div>

    <div class="detail-grid">
      <!-- Left: Items -->
      <div>
        <div class="card" style="margin-bottom:1.5rem">
          <div class="card-title">Order Items</div>
          <div th:each="item : ${order.items}" class="order-item">
            <div class="item-img">
              <img th:if="${item.productImage != null}" th:src="@{'/uploads/' + ${item.productImage}}" th:alt="${item.productName}"/>
              <span th:if="${item.productImage == null}">👗</span>
            </div>
            <div>
              <div class="item-name" th:text="${item.productName}"></div>
              <div class="item-sub" th:text="'Qty: ' + ${item.quantity} + ' × $' + ${item.price}"></div>
            </div>
            <div class="item-price" th:text="${'$' + item.subtotal}"></div>
          </div>
          <div class="total-row">
            <span>Total</span>
            <span th:text="${'$' + order.totalAmount}"></span>
          </div>
        </div>

        <div class="card">
          <div class="card-title">Shipping Address</div>
          <p th:text="${order.customerName}" style="font-weight:600;margin-bottom:0.3rem"></p>
          <p th:text="${order.shippingAddress}" style="color:var(--warm-grey);font-size:0.9rem"></p>
          <p th:text="${order.shippingCity + ', ' + order.shippingState + ' ' + order.shippingZip}" style="color:var(--warm-grey);font-size:0.9rem"></p>
        </div>
      </div>

      <!-- Right: Info & Status -->
      <div>
        <div class="card" style="margin-bottom:1.5rem">
          <div class="card-title">Order Info</div>
          <div class="info-row">
            <span class="info-label">Order ID</span>
            <span th:text="'#KAL-' + ${order.id}"></span>
          </div>
          <div class="info-row">
            <span class="info-label">Date</span>
            <span th:text="${#temporals.format(order.orderDate, 'MMM dd, yyyy HH:mm')}"></span>
          </div>
          <div class="info-row">
            <span class="info-label">Customer</span>
            <span th:text="${order.customerName}"></span>
          </div>
          <div class="info-row">
            <span class="info-label">Email</span>
            <span th:text="${order.customerEmail}"></span>
          </div>
          <div class="info-row">
            <span class="info-label">Status</span>
            <span class="status-badge" th:text="${order.status}"
                  th:classappend="${'status-' + order.status}"></span>
          </div>
        </div>

        <div class="card">
          <div class="card-title">Update Status</div>
          <form th:action="@{'/admin/orders/status/' + ${order.id}}" method="post">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <div class="status-form">
              <select class="status-select" name="status">
                <option value="PENDING"   th:selected="${order.status == 'PENDING'}">Pending</option>
                <option value="CONFIRMED" th:selected="${order.status == 'CONFIRMED'}">Confirmed</option>
                <option value="SHIPPED"   th:selected="${order.status == 'SHIPPED'}">Shipped</option>
                <option value="DELIVERED" th:selected="${order.status == 'DELIVERED'}">Delivered</option>
                <option value="CANCELLED" th:selected="${order.status == 'CANCELLED'}">Cancelled</option>
              </select>
              <button type="submit" class="btn-update">Update</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </main>
</body>
</html>
