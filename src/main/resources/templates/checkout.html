<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Checkout — KALAKAR</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;700&family=Bebas+Neue&family=Karla:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --saffron: #E8621A; --night: #0F0C09; --bone: #F2EDE4; --cream: #EDE7D9; --warm-grey: #9C9080; --border: rgba(15,12,9,0.1); }
    body { font-family: 'Karla', sans-serif; background: var(--bone); color: var(--night); }
    nav { background: var(--night); padding: 1.2rem 3rem; display: flex; justify-content: space-between; align-items: center; }
    .nav-logo { font-family: 'Bebas Neue', sans-serif; font-size: 1.8rem; letter-spacing: 0.15em; color: white; text-decoration: none; }
    .nav-logo span { color: var(--saffron); }
    .checkout-wrap { max-width: 1100px; margin: 3rem auto; padding: 0 2rem; display: grid; grid-template-columns: 1.4fr 1fr; gap: 3rem; }
    .section-title { font-family: 'Cormorant Garamond', serif; font-size: 1.6rem; font-weight: 700; margin-bottom: 1.5rem; }
    .form-card { background: white; padding: 2rem; }
    .form-section { margin-bottom: 1.8rem; }
    .form-section-title { font-size: 0.7rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--saffron); margin-bottom: 1rem; padding-bottom: 0.5rem; border-bottom: 1px solid var(--border); }
    .form-row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .form-group { margin-bottom: 1rem; }
    .form-label { display: block; font-size: 0.72rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--warm-grey); margin-bottom: 0.4rem; }
    .form-input { width: 100%; padding: 0.8rem 1rem; border: 1.5px solid var(--border); background: #fafaf7; font-family: 'Karla', sans-serif; font-size: 0.95rem; outline: none; transition: border-color 0.2s; }
    .form-input:focus { border-color: var(--saffron); background: white; }
    .order-summary { background: white; padding: 2rem; height: fit-content; position: sticky; top: 2rem; }
    .summary-product { display: flex; gap: 1rem; padding: 1rem 0; border-bottom: 1px solid var(--border); }
    .summary-img { width: 70px; height: 70px; object-fit: cover; border: 1px solid var(--border); background: var(--cream); display: flex; align-items: center; justify-content: center; font-size: 1.5rem; flex-shrink: 0; }
    .summary-img img { width: 100%; height: 100%; object-fit: cover; }
    .summary-name { font-family: 'Cormorant Garamond', serif; font-size: 1rem; font-weight: 600; }
    .summary-price { font-size: 0.95rem; color: var(--saffron); font-weight: 600; margin-top: 0.3rem; }
    .qty-control { display: flex; align-items: center; gap: 0.5rem; margin-top: 0.5rem; }
    .qty-btn { width: 28px; height: 28px; border: 1.5px solid var(--border); background: transparent; cursor: pointer; font-size: 1rem; transition: all 0.2s; }
    .qty-btn:hover { background: var(--night); color: white; border-color: var(--night); }
    .qty-input { width: 40px; text-align: center; border: 1.5px solid var(--border); padding: 0.2rem; font-family: 'Karla', sans-serif; }
    .summary-totals { padding: 1rem 0; }
    .summary-row { display: flex; justify-content: space-between; font-size: 0.88rem; margin-bottom: 0.6rem; color: var(--warm-grey); }
    .summary-total { display: flex; justify-content: space-between; font-family: 'Cormorant Garamond', serif; font-size: 1.3rem; font-weight: 700; padding-top: 0.8rem; border-top: 1px solid var(--border); }
    .btn-order { width: 100%; padding: 1.1rem; background: var(--saffron); color: white; border: none; font-family: 'Karla', sans-serif; font-size: 0.85rem; letter-spacing: 0.15em; text-transform: uppercase; cursor: pointer; margin-top: 1.5rem; transition: background 0.25s; }
    .btn-order:hover { background: var(--night); }
    .secure-badge { text-align: center; font-size: 0.75rem; color: var(--warm-grey); margin-top: 0.8rem; }
    @media (max-width: 768px) { .checkout-wrap { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <nav>
    <a href="/" class="nav-logo">KAL<span>A</span>KAR</a>
    <span style="color:rgba(255,255,255,0.4);font-size:0.8rem;letter-spacing:0.15em;text-transform:uppercase;">Secure Checkout</span>
  </nav>

  <div class="checkout-wrap">
    <!-- Left: Form -->
    <div>
      <h1 class="section-title">Checkout</h1>
      <form class="form-card" th:action="@{/orders/place}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <input type="hidden" name="productId" th:value="${product?.id}"/>
        <input type="hidden" name="quantity" id="qtyHidden" value="1"/>

        <div class="form-section">
          <div class="form-section-title">Contact Info</div>
          <div class="form-row-2">
            <div class="form-group">
              <label class="form-label">Full Name</label>
              <input class="form-input" type="text" name="customerName" placeholder="Jane Smith" required/>
            </div>
            <div class="form-group">
              <label class="form-label">Email</label>
              <input class="form-input" type="email" name="customerEmail" th:value="${email}" placeholder="you@example.com" required/>
            </div>
          </div>
        </div>

        <div class="form-section">
          <div class="form-section-title">Shipping Address</div>
          <div class="form-group">
            <label class="form-label">Street Address</label>
            <input class="form-input" type="text" name="address" placeholder="123 Main St" required/>
          </div>
          <div class="form-row-2">
            <div class="form-group">
              <label class="form-label">City</label>
              <input class="form-input" type="text" name="city" placeholder="New York" required/>
            </div>
            <div class="form-group">
              <label class="form-label">State</label>
              <input class="form-input" type="text" name="state" placeholder="NY" required/>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">ZIP Code</label>
            <input class="form-input" type="text" name="zip" placeholder="10001" required/>
          </div>
        </div>

        <button type="submit" class="btn-order">Place Order →</button>
        <p class="secure-badge">🔒 Secure checkout — Your info is protected</p>
      </form>
    </div>

    <!-- Right: Order Summary -->
    <div>
      <h2 class="section-title">Order Summary</h2>
      <div class="order-summary">
        <div class="summary-product" th:if="${product != null}">
          <div class="summary-img">
            <img th:if="${product.imageUrl != null}" th:src="@{'/uploads/' + ${product.imageUrl}}" th:alt="${product.name}"/>
            <span th:if="${product.imageUrl == null}">👗</span>
          </div>
          <div>
            <div class="summary-name" th:text="${product.name}"></div>
            <div class="summary-price" th:text="${'$' + product.price}"></div>
            <div class="qty-control">
              <button type="button" class="qty-btn" onclick="changeQty(-1)">−</button>
              <input class="qty-input" type="number" id="qtyDisplay" value="1" min="1" max="10" readonly/>
              <button type="button" class="qty-btn" onclick="changeQty(1)">+</button>
            </div>
          </div>
        </div>

        <div class="summary-totals">
          <div class="summary-row"><span>Subtotal</span><span id="subtotal" th:text="${'$' + product?.price}">$0</span></div>
          <div class="summary-row"><span>Shipping</span><span>Free</span></div>
          <div class="summary-total"><span>Total</span><span id="total" th:text="${'$' + product?.price}">$0</span></div>
        </div>

        <button type="submit" form="checkoutForm" class="btn-order" onclick="document.querySelector('form').submit()">Place Order →</button>
      </div>
    </div>
  </div>

  <script th:inline="javascript">
    const unitPrice = /*[[${product?.price}]]*/ 0;
    let qty = 1;

    function changeQty(delta) {
      qty = Math.max(1, Math.min(10, qty + delta));
      document.getElementById('qtyDisplay').value = qty;
      document.getElementById('qtyHidden').value = qty;
      const subtotal = (unitPrice * qty).toFixed(2);
      document.getElementById('subtotal').textContent = '$' + subtotal;
      document.getElementById('total').textContent = '$' + subtotal;
    }
  </script>
</body>
</html>
