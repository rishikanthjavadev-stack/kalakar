<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — KALAKAR</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,700;1,400&family=Bebas+Neue&family=Karla:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --saffron: #E8621A; --night: #0F0C09;
      --bone: #F2EDE4; --cream: #EDE7D9;
      --warm-grey: #9C9080; --border: rgba(15,12,9,0.12);
    }
    body {
      font-family: 'Karla', sans-serif;
      background: var(--bone); color: var(--night);
      min-height: 100vh; display: grid; grid-template-columns: 1fr 1fr;
    }
    /* Left panel */
    .auth-left {
      background: linear-gradient(160deg, #C4956A 0%, #8B5E3C 40%, #3D2B1F 100%);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 3rem; position: relative; overflow: hidden;
    }
    .auth-left::before {
      content: '';
      position: absolute; inset: 0;
      background-image:
        repeating-linear-gradient(45deg, rgba(255,255,255,0.03) 0px, rgba(255,255,255,0.03) 1px, transparent 1px, transparent 12px),
        repeating-linear-gradient(-45deg, rgba(255,255,255,0.03) 0px, rgba(255,255,255,0.03) 1px, transparent 1px, transparent 12px);
    }
    .auth-brand {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 4rem; letter-spacing: 0.15em;
      color: white; text-decoration: none; z-index: 1;
    }
    .auth-brand span { color: #F4915A; }
    .auth-tagline {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic; font-size: 1.2rem;
      color: rgba(255,255,255,0.6); margin-top: 1rem;
      z-index: 1; text-align: center;
    }
    .auth-deco { font-size: 6rem; opacity: 0.1; z-index: 1; margin-top: 2rem; }

    /* Right panel */
    .auth-right {
      display: flex; align-items: center; justify-content: center;
      padding: 3rem;
    }
    .auth-box { width: 100%; max-width: 420px; }
    .auth-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2.5rem; font-weight: 700; margin-bottom: 0.5rem;
    }
    .auth-subtitle { color: var(--warm-grey); font-size: 0.9rem; margin-bottom: 2.5rem; }

    /* Alerts */
    .alert {
      padding: 0.85rem 1.2rem; margin-bottom: 1.5rem;
      font-size: 0.85rem; border-left: 3px solid;
    }
    .alert-error { background: #fde8e0; color: #c0392b; border-color: var(--saffron); }
    .alert-success { background: #e8f5e9; color: #2e7d32; border-color: #4caf50; }

    /* Form */
    .form-group { margin-bottom: 1.4rem; }
    .form-label {
      display: block; font-size: 0.72rem;
      letter-spacing: 0.15em; text-transform: uppercase;
      color: var(--warm-grey); margin-bottom: 0.5rem;
    }
    .form-input {
      width: 100%; padding: 0.85rem 1rem;
      border: 1.5px solid var(--border); background: white;
      font-family: 'Karla', sans-serif; font-size: 0.95rem;
      outline: none; transition: border-color 0.2s;
    }
    .form-input:focus { border-color: var(--saffron); }
    .form-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.8rem; }
    .remember { display: flex; align-items: center; gap: 0.5rem; font-size: 0.82rem; color: var(--warm-grey); cursor: pointer; }
    .forgot { font-size: 0.82rem; color: var(--saffron); text-decoration: none; }
    .forgot:hover { text-decoration: underline; }

    .btn-submit {
      width: 100%; padding: 1rem;
      background: var(--night); color: var(--bone);
      border: none; font-family: 'Karla', sans-serif;
      font-size: 0.85rem; letter-spacing: 0.15em; text-transform: uppercase;
      cursor: pointer; transition: background 0.25s;
      clip-path: polygon(0 0, calc(100% - 10px) 0, 100% 10px, 100% 100%, 10px 100%, 0 calc(100% - 10px));
    }
    .btn-submit:hover { background: var(--saffron); }

    .auth-divider {
      display: flex; align-items: center; gap: 1rem;
      margin: 1.8rem 0; color: var(--warm-grey); font-size: 0.78rem;
    }
    .auth-divider::before, .auth-divider::after {
      content: ''; flex: 1; height: 1px; background: var(--border);
    }
    .auth-switch { text-align: center; font-size: 0.88rem; color: var(--warm-grey); }
    .auth-switch a { color: var(--saffron); text-decoration: none; font-weight: 500; }
    .auth-switch a:hover { text-decoration: underline; }

    @media (max-width: 768px) {
      body { grid-template-columns: 1fr; }
      .auth-left { display: none; }
    }
  </style>
</head>
<body>

  <!-- Left Branding Panel -->
  <div class="auth-left">
    <a href="/" class="auth-brand">KAL<span>A</span>KAR</a>
    <p class="auth-tagline">"Every thread tells a story."</p>
    <div class="auth-deco">👘</div>
  </div>

  <!-- Right Form Panel -->
  <div class="auth-right">
    <div class="auth-box">
      <h1 class="auth-title">Welcome Back</h1>
      <p class="auth-subtitle">Sign in to your Kalakar account</p>

      <!-- Error message -->
      <div class="alert alert-error" th:if="${param.error}">
        Invalid email or password.
      </div>
      <!-- Logout message -->
      <div class="alert alert-success" th:if="${logout}">You have been logged out successfully.</div>

      <!-- Registered message -->
      <div class="alert alert-success" th:if="${param.registered}">Account created! Please log in.</div>

      <!-- Login Form — Spring Security handles POST /login -->
      <form th:action="@{/login}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

        <div class="form-group">
          <label class="form-label" for="email">Email Address</label>
          <input class="form-input" type="email" id="email"
                 name="email" placeholder="you@example.com" required/>
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input class="form-input" type="password" id="password"
                 name="password" placeholder="••••••••" required/>
        </div>

        <div class="form-row">
          <label class="remember">
            <input type="checkbox" name="remember-me"/> Remember me
          </label>
          <a href="/forgot-password" class="forgot">Forgot password?</a>
        </div>

        <!-- CSRF token — required by Spring Security -->

        <button type="submit" class="btn-submit">Sign In</button>
      </form>

      <div class="auth-divider">or</div>

      <p class="auth-switch">
        Don't have an account? <a href="/register">Create one →</a>
      </p>
    </div>
  </div>

</body>
</html>
