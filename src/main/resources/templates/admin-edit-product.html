<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Edit Product | KALAKAR Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;700&family=Bebas+Neue&family=Karla:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --saffron: #E8621A; --night: #0F0C09; --bone: #F2EDE4; --cream: #EDE7D9; --warm-grey: #9C9080; --border: rgba(15,12,9,0.1); }
    body { font-family: 'Karla', sans-serif; background: var(--cream); display: flex; min-height: 100vh; }
    .sidebar { width: 240px; background: var(--night); color: var(--bone); padding: 2rem 1.5rem; display: flex; flex-direction: column; gap: 0.5rem; position: fixed; height: 100vh; }
    .sidebar-logo { font-family: 'Bebas Neue', sans-serif; font-size: 1.8rem; letter-spacing: 0.15em; margin-bottom: 2rem; }
    .sidebar-logo span { color: var(--saffron); }
    .sidebar-label { font-size: 0.62rem; letter-spacing: 0.2em; text-transform: uppercase; color: rgba(242,237,228,0.3); margin: 1rem 0 0.5rem; }
    .sidebar-link { display: flex; align-items: center; gap: 0.8rem; padding: 0.7rem 1rem; color: rgba(242,237,228,0.6); text-decoration: none; font-size: 0.88rem; transition: all 0.2s; }
    .sidebar-link:hover, .sidebar-link.active { background: rgba(255,255,255,0.06); color: var(--bone); }
    .sidebar-link.active { border-left: 2px solid var(--saffron); }
    .main { margin-left: 240px; flex: 1; padding: 2.5rem; }
    .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
    .page-title { font-family: 'Cormorant Garamond', serif; font-size: 2rem; font-weight: 700; }
    .back-link { color: var(--warm-grey); text-decoration: none; font-size: 0.82rem; }
    .form-card { background: white; padding: 2.5rem; max-width: 700px; box-shadow: 0 2px 12px rgba(15,12,9,0.06); }
    .alert-error { padding: 0.85rem 1.2rem; background: #fde8e0; color: #c0392b; border-left: 3px solid var(--saffron); margin-bottom: 1.5rem; font-size: 0.85rem; }
    .form-section { margin-bottom: 2rem; }
    .form-section-title { font-size: 0.7rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--saffron); margin-bottom: 1.2rem; padding-bottom: 0.5rem; border-bottom: 1px solid var(--border); }
    .form-row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1.2rem; }
    .form-group { margin-bottom: 1.3rem; }
    .form-label { display: block; font-size: 0.72rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--warm-grey); margin-bottom: 0.5rem; }
    .form-input, .form-select { width: 100%; padding: 0.85rem 1rem; border: 1.5px solid var(--border); background: white; font-family: 'Karla', sans-serif; font-size: 0.95rem; outline: none; transition: border-color 0.2s; }
    .form-input:focus, .form-select:focus { border-color: var(--saffron); }
    .current-image { display: flex; align-items: center; gap: 1rem; margin-bottom: 1rem; padding: 1rem; background: #fafaf7; border: 1px solid var(--border); }
    .current-image img { width: 80px; height: 80px; object-fit: cover; border: 1px solid var(--border); }
    .current-image-label { font-size: 0.78rem; color: var(--warm-grey); }
    .upload-area { border: 2px dashed var(--border); padding: 2rem; text-align: center; cursor: pointer; transition: all 0.2s; position: relative; background: #fafaf7; }
    .upload-area:hover { border-color: var(--saffron); }
    .upload-area input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
    .btn-submit { padding: 1rem 3rem; background: var(--saffron); color: white; border: none; font-family: 'Karla', sans-serif; font-size: 0.85rem; letter-spacing: 0.15em; text-transform: uppercase; cursor: pointer; transition: background 0.25s; margin-top: 1rem; }
    .btn-submit:hover { background: var(--night); }
    .btn-cancel { padding: 1rem 2rem; background: transparent; color: var(--warm-grey); border: 1.5px solid var(--border); font-family: 'Karla', sans-serif; font-size: 0.85rem; text-transform: uppercase; cursor: pointer; margin-top: 1rem; margin-left: 1rem; text-decoration: none; display: inline-block; }
  </style>
</head>
<body>
  <aside class="sidebar">
    <div class="sidebar-logo">KAL<span>A</span>KAR</div>
    <span class="sidebar-label">Store</span>
    <a href="/" class="sidebar-link">🏠 View Store</a>
    <span class="sidebar-label">Products</span>
    <a href="/admin/products" class="sidebar-link active">👗 All Products</a>
    <a href="/admin/products/add" class="sidebar-link">➕ Add Product</a>
    <span class="sidebar-label">Account</span>
    <a href="/logout" class="sidebar-link">🚪 Logout</a>
  </aside>

  <main class="main">
    <div class="page-header">
      <h1 class="page-title">Edit Product</h1>
      <a href="/admin/products" class="back-link">← Back to Products</a>
    </div>

    <div class="form-card">
      <div class="alert-error" th:if="${error}" th:text="${error}"></div>

      <form th:action="@{'/admin/products/edit/' + ${product.id}}" method="post" enctype="multipart/form-data">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

        <div class="form-section">
          <div class="form-section-title">Product Details</div>
          <div class="form-group">
            <label class="form-label">Product Name *</label>
            <input class="form-input" type="text" name="name" th:value="${product.name}" required/>
          </div>
          <div class="form-row-2">
            <div class="form-group">
              <label class="form-label">Category *</label>
              <select class="form-select" name="category" required>
                <option value="kurtas"  th:selected="${product.category == 'kurtas'}">Kurtas</option>
                <option value="sarees"  th:selected="${product.category == 'sarees'}">Sarees</option>
                <option value="dresses" th:selected="${product.category == 'dresses'}">Dresses</option>
                <option value="shirts"  th:selected="${product.category == 'shirts'}">Shirts</option>
                <option value="bottoms" th:selected="${product.category == 'bottoms'}">Bottoms</option>
                <option value="jackets" th:selected="${product.category == 'jackets'}">Jackets</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label">Fabric *</label>
              <input class="form-input" type="text" name="fabric" th:value="${product.fabric}" required/>
            </div>
          </div>
        </div>

        <div class="form-section">
          <div class="form-section-title">Pricing</div>
          <div class="form-row-2">
            <div class="form-group">
              <label class="form-label">Price ($) *</label>
              <input class="form-input" type="number" name="price" th:value="${product.price}" step="0.01" min="0" required/>
            </div>
            <div class="form-group">
              <label class="form-label">Original Price ($)</label>
              <input class="form-input" type="number" name="oldPrice" th:value="${product.oldPrice}" step="0.01" min="0"/>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">Badge</label>
            <select class="form-select" name="badge">
              <option value=""     th:selected="${product.badge == null}">No badge</option>
              <option value="New"  th:selected="${product.badge == 'New'}">New</option>
              <option value="Sale" th:selected="${product.badge == 'Sale'}">Sale</option>
            </select>
          </div>
        </div>

        <div class="form-section">
          <div class="form-section-title">Product Image</div>
          <div class="current-image" th:if="${product.imageUrl != null}">
            <img th:src="@{'/uploads/' + ${product.imageUrl}}" th:alt="${product.name}"/>
            <span class="current-image-label">Current image — upload a new one to replace it</span>
          </div>
          <div class="upload-area">
            <input type="file" name="image" accept="image/jpeg,image/png,image/webp"/>
            <div style="font-size:2rem;margin-bottom:0.5rem">📸</div>
            <div style="font-size:0.9rem;color:var(--warm-grey)"><strong style="color:var(--saffron)">Click to upload</strong> new image</div>
            <div style="font-size:0.75rem;color:#bbb;margin-top:0.3rem">Leave empty to keep current image</div>
          </div>
        </div>

        <div>
          <button type="submit" class="btn-submit">Update Product</button>
          <a href="/admin/products" class="btn-cancel">Cancel</a>
        </div>
      </form>
    </div>
  </main>
</body>
</html>
