<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <title>Admin Orders | KALAKAR</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;700&family=Bebas+Neue&family=Karla:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --saffron: #E8621A; --night: #0F0C09; --bone: #F2EDE4; --cream: #EDE7D9; --warm-grey: #9C9080; --border: rgba(15,12,9,0.1); }
    body { font-family: 'Karla', sans-serif; background: var(--cream); display: flex; min-height: 100vh; }
    .sidebar { width: 240px; background: var(--night); color: var(--bone); padding: 2rem 1.5rem; display: flex; flex-direction: column; gap: 0.5rem; position: fixed; height: 100vh; }
    .sidebar-logo { font-family: 'Bebas Neue', sans-serif; font-size: 1.8rem; letter-spacing: 0.15em; margin-bottom: 2rem; }
    .sidebar-logo span { color: var(--saffron); }
    .sidebar-label { font-size: 0.62rem; letter-spacing: 0.2em; text-transform: uppercase; color: rgba(242,237,228,0.3); margin: 1rem 0 0.5rem; }
    .sidebar-link { display: flex; align-items: center; gap: 0.8rem; padding: 0.7rem 1rem; color: rgba(242,237,228,0.6); text-decoration: none; font-size: 0.88rem; transition: all 0.2s; }
    .sidebar-link:hover, .sidebar-link.active { background: rgba(255,255,255,0.06); color: var(--bone); }
    .sidebar-link.active { border-left: 2px solid var(--saffron); }
    .main { margin-left: 240px; flex: 1; padding: 2.5rem; }
    .page-title { font-family: 'Cormorant Garamond', serif; font-size: 2rem; font-weight: 700; margin-bottom: 2rem; }
    .alert-success { padding: 0.85rem 1.2rem; background: #e8f5e9; color: #2e7d32; border-left: 3px solid #4caf50; margin-bottom: 1.5rem; font-size: 0.85rem; }
    .stats-row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 1rem; margin-bottom: 2rem; }
    .stat-card { background: white; padding: 1.2rem; border-bottom: 3px solid var(--saffron); }
    .stat-card-num { font-family: 'Cormorant Garamond', serif; font-size: 2rem; font-weight: 700; color: var(--saffron); }
    .stat-card-label { font-size: 0.68rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--warm-grey); margin-top: 0.2rem; }
    .table-wrap { background: white; box-shadow: 0 2px 12px rgba(15,12,9,0.06); }
    table { width: 100%; border-collapse: collapse; }
    th { padding: 0.9rem 1.2rem; text-align: left; font-size: 0.68rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--warm-grey); border-bottom: 1px solid var(--border); background: #fafaf7; }
    td { padding: 1rem 1.2rem; border-bottom: 1px solid var(--border); font-size: 0.88rem; vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #fafaf7; }
    .status { font-size: 0.68rem; letter-spacing: 0.1em; text-transform: uppercase; padding: 0.25rem 0.7rem; display: inline-block; }
    .status-PENDING   { background: #fff3e0; color: #e65100; }
    .status-CONFIRMED { background: #e3f2fd; color: #1565c0; }
    .status-SHIPPED   { background: #f3e5f5; color: #6a1b9a; }
    .status-DELIVERED { background: #e8f5e9; color: #2e7d32; }
    .status-CANCELLED { background: #ffebee; color: #c62828; }
    .status-select { padding: 0.4rem 0.6rem; border: 1.5px solid var(--border); background: white; font-family: 'Karla', sans-serif; font-size: 0.8rem; cursor: pointer; }
    .btn-update { padding: 0.4rem 0.8rem; background: var(--saffron); color: white; border: none; font-size: 0.72rem; cursor: pointer; letter-spacing: 0.08em; text-transform: uppercase; transition: background 0.2s; }
    .btn-update:hover { background: var(--night); }
    .btn-view { padding: 0.4rem 0.8rem; background: transparent; border: 1.5px solid var(--night); color: var(--night); font-size: 0.72rem; text-decoration: none; letter-spacing: 0.08em; text-transform: uppercase; transition: all 0.2s; display: inline-block; }
    .btn-view:hover { background: var(--night); color: var(--bone); }
    .empty { text-align: center; padding: 3rem; color: var(--warm-grey); }
  </style>
</head>
<body>
  <aside class="sidebar">
    <div class="sidebar-logo">KAL<span>A</span>KAR</div>
    <span class="sidebar-label">Store</span>
    <a href="/" class="sidebar-link">🏠 View Store</a>
    <span class="sidebar-label">Products</span>
    <a href="/admin/products" class="sidebar-link">👗 All Products</a>
    <a href="/admin/products/add" class="sidebar-link">➕ Add Product</a>
    <span class="sidebar-label">Orders</span>
    <a href="/admin/orders" class="sidebar-link active">📦 All Orders</a>
    <span class="sidebar-label">Account</span>
    <a href="/logout" class="sidebar-link">🚪 Logout</a>
  </aside>

  <main class="main">
    <h1 class="page-title">Orders</h1>

    <div class="alert-success" th:if="${param.updated}">✓ Order status updated!</div>

    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-card-num" th:text="${orders != null ? orders.size() : 0}">0</div>
        <div class="stat-card-label">Total</div>
      </div>
      <div class="stat-card">
        <div class="stat-card-num" id="pendingCount">0</div>
        <div class="stat-card-label">Pending</div>
      </div>
      <div class="stat-card">
        <div class="stat-card-num" id="confirmedCount">0</div>
        <div class="stat-card-label">Confirmed</div>
      </div>
      <div class="stat-card">
        <div class="stat-card-num" id="shippedCount">0</div>
        <div class="stat-card-label">Shipped</div>
      </div>
      <div class="stat-card">
        <div class="stat-card-num" id="deliveredCount">0</div>
        <div class="stat-card-label">Delivered</div>
      </div>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Order ID</th>
            <th>Customer</th>
            <th>Email</th>
            <th>Date</th>
            <th>Total</th>
            <th>Status</th>
            <th>Update</th>
            <th>View</th>
          </tr>
        </thead>
        <tbody>
          <tr th:if="${orders == null or orders.empty}">
            <td colspan="8" class="empty">No orders yet.</td>
          </tr>
          <tr th:each="order : ${orders}">
            <td th:text="'#KAL-' + ${order.id}"></td>
            <td th:text="${order.customerName}"></td>
            <td th:text="${order.customerEmail}"></td>
            <td th:text="${#temporals.format(order.orderDate, 'MMM dd, yyyy')}"></td>
            <td th:text="${'$' + order.totalAmount}"></td>
            <td>
              <span class="status"
                    th:text="${order.status}"
                    th:classappend="${'status-' + order.status}">
              </span>
            </td>
            <td>
              <form th:action="@{'/admin/orders/status/' + ${order.id}}" method="post"
                    style="display:flex;gap:0.4rem">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <select class="status-select" name="status">
                  <option value="PENDING"   th:selected="${order.status == 'PENDING'}">Pending</option>
                  <option value="CONFIRMED" th:selected="${order.status == 'CONFIRMED'}">Confirmed</option>
                  <option value="SHIPPED"   th:selected="${order.status == 'SHIPPED'}">Shipped</option>
                  <option value="DELIVERED" th:selected="${order.status == 'DELIVERED'}">Delivered</option>
                  <option value="CANCELLED" th:selected="${order.status == 'CANCELLED'}">Cancelled</option>
                </select>
                <button type="submit" class="btn-update">Save</button>
              </form>
            </td>
            <td>
              <a th:href="@{'/admin/orders/' + ${order.id}}" class="btn-view">View</a>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </main>

  <script th:inline="javascript">
    const orders = /*[[${orders}]]*/ [];
    if (orders) {
      document.getElementById('pendingCount').textContent =
        orders.filter(o => o.status === 'PENDING').length;
      document.getElementById('confirmedCount').textContent =
        orders.filter(o => o.status === 'CONFIRMED').length;
      document.getElementById('shippedCount').textContent =
        orders.filter(o => o.status === 'SHIPPED').length;
      document.getElementById('deliveredCount').textContent =
        orders.filter(o => o.status === 'DELIVERED').length;
    }
  </script>
</body>
</html>
