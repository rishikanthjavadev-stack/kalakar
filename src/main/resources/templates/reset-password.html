<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reset Password — KALAKAR</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,700;1,400&family=Bebas+Neue&family=Karla:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --saffron: #E8621A; --night: #0F0C09; --bone: #F2EDE4; --warm-grey: #9C9080; --border: rgba(15,12,9,0.12); }
    body { font-family: 'Karla', sans-serif; background: var(--bone); color: var(--night); min-height: 100vh; display: grid; grid-template-columns: 1fr 1fr; }
    .auth-left { background: linear-gradient(160deg, #C4956A 0%, #8B5E3C 40%, #3D2B1F 100%); display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 3rem; }
    .auth-brand { font-family: 'Bebas Neue', sans-serif; font-size: 4rem; letter-spacing: 0.15em; color: white; text-decoration: none; }
    .auth-brand span { color: #F4915A; }
    .auth-tagline { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 1.2rem; color: rgba(255,255,255,0.6); margin-top: 1rem; text-align: center; }
    .auth-icon { font-size: 5rem; margin-top: 2rem; }
    .auth-right { display: flex; align-items: center; justify-content: center; padding: 3rem; }
    .auth-box { width: 100%; max-width: 420px; }
    .auth-title { font-family: 'Cormorant Garamond', serif; font-size: 2.5rem; font-weight: 700; margin-bottom: 0.5rem; }
    .auth-subtitle { color: var(--warm-grey); font-size: 0.9rem; margin-bottom: 2.5rem; }
    .alert { padding: 0.85rem 1.2rem; margin-bottom: 1.5rem; font-size: 0.85rem; border-left: 3px solid; }
    .alert-error { background: #fde8e0; color: #c0392b; border-color: var(--saffron); }
    .form-group { margin-bottom: 1.3rem; }
    .form-label { display: block; font-size: 0.72rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--warm-grey); margin-bottom: 0.5rem; }
    .form-input { width: 100%; padding: 0.85rem 1rem; border: 1.5px solid var(--border); background: white; font-family: 'Karla', sans-serif; font-size: 0.95rem; outline: none; transition: border-color 0.2s; }
    .form-input:focus { border-color: var(--saffron); }
    .password-strength { height: 4px; background: var(--border); margin-top: 0.5rem; border-radius: 2px; overflow: hidden; }
    .password-strength-bar { height: 100%; width: 0; transition: all 0.3s; border-radius: 2px; }
    .strength-label { font-size: 0.72rem; color: var(--warm-grey); margin-top: 0.3rem; }
    .btn-submit { width: 100%; padding: 1rem; background: var(--saffron); color: white; border: none; font-family: 'Karla', sans-serif; font-size: 0.85rem; letter-spacing: 0.15em; text-transform: uppercase; cursor: pointer; transition: background 0.25s; }
    .btn-submit:hover { background: var(--night); }
    .auth-links { margin-top: 1.5rem; text-align: center; }
    .auth-links a { color: var(--saffron); text-decoration: none; font-size: 0.88rem; }
    @media (max-width: 768px) { body { grid-template-columns: 1fr; } .auth-left { display: none; } }
  </style>
</head>
<body>
  <div class="auth-left">
    <a href="/" class="auth-brand">KAL<span>A</span>KAR</a>
    <p class="auth-tagline">"Choose a strong new password."</p>
    <div class="auth-icon">🔑</div>
  </div>

  <div class="auth-right">
    <div class="auth-box">
      <h1 class="auth-title">New Password</h1>
      <p class="auth-subtitle">Choose a strong password for your account.</p>

      <div class="alert alert-error" th:if="${error}" th:text="${error}"></div>

      <form th:action="@{/reset-password}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <input type="hidden" name="token" th:value="${token}"/>

        <div class="form-group">
          <label class="form-label">New Password</label>
          <input class="form-input" type="password" name="password"
                 id="passwordInput"
                 placeholder="Min 8 characters" required minlength="8"
                 oninput="checkStrength(this.value)"/>
          <div class="password-strength">
            <div class="password-strength-bar" id="strengthBar"></div>
          </div>
          <div class="strength-label" id="strengthLabel"></div>
        </div>

        <div class="form-group">
          <label class="form-label">Confirm New Password</label>
          <input class="form-input" type="password" name="confirmPassword"
                 placeholder="Repeat password" required minlength="8"/>
        </div>

        <button type="submit" class="btn-submit">Set New Password</button>
      </form>

      <div class="auth-links">
        <a href="/login">← Back to Sign In</a>
      </div>
    </div>
  </div>

  <script>
    function checkStrength(val) {
      const bar = document.getElementById('strengthBar');
      const label = document.getElementById('strengthLabel');
      let score = 0;
      if (val.length >= 8)  score++;
      if (val.length >= 12) score++;
      if (/[A-Z]/.test(val)) score++;
      if (/[0-9]/.test(val)) score++;
      if (/[^A-Za-z0-9]/.test(val)) score++;
      const levels = [
        { w: '20%', c: '#e74c3c', t: 'Very weak' },
        { w: '40%', c: '#e67e22', t: 'Weak' },
        { w: '60%', c: '#f1c40f', t: 'Fair' },
        { w: '80%', c: '#2ecc71', t: 'Strong' },
        { w: '100%', c: '#27ae60', t: 'Very strong' },
      ];
      const lvl = levels[Math.min(score, 4)];
      bar.style.width = lvl.w;
      bar.style.background = lvl.c;
      label.textContent = lvl.t;
      label.style.color = lvl.c;
    }
  </script>
</body>
</html>
